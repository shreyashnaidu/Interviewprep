<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep Roadmap — Yash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F7F4; --panel:#FFFFFF; --ink:#131A16; --muted:#4C5A53; --line:#D8DED7;
  --node:#FFE873;          /* roadmap.sh yellow */
  --node-border:#2B2B2B;
  --child:#FFF9D9;
  --connector:#2F5FC4;     /* roadmap.sh-style blue connectors */
  --done:#1B6E53; --done-bg:#DFF0E7;
  --py:#2F5FC4; --dsa:#C8452F; --sql:#B07C1F; --sys:#6B4FC4; --ml:#1B6E53;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:15.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(19,26,22,.06) 1px, transparent 1px);
  background-size:26px 26px;}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

header{padding:46px 0 20px;text-align:center}
.eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--done);margin-bottom:12px}
h1{font-family:"Archivo",sans-serif;font-variation-settings:"wdth" 110;font-weight:850;font-size:clamp(1.9rem,5vw,3rem);letter-spacing:-.02em;line-height:1.05;margin-bottom:10px}
.sub{color:var(--muted);max-width:58ch;margin:0 auto}

/* sticky progress */
.progress-card{position:sticky;top:0;z-index:40;background:rgba(246,247,244,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 0}
.progress-inner{display:flex;align-items:center;gap:16px}
.pct{font-family:"IBM Plex Mono",monospace;font-size:.9rem;min-width:120px}
.bar{flex:1;height:10px;background:var(--line);border-radius:99px;overflow:hidden}
.bar>div{height:100%;width:0%;background:var(--done);border-radius:99px;transition:width .3s ease}
.reset-btn{font-family:"IBM Plex Mono",monospace;font-size:.72rem;padding:7px 14px;border:1px solid var(--line);border-radius:99px;background:var(--panel);color:var(--muted);cursor:pointer}
.reset-btn:hover{color:var(--ink);border-color:var(--ink)}

/* ============ THE TREE ============ */
.map{position:relative;padding:40px 0 10px}
.map::before{ /* central spine */
  content:"";position:absolute;left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%);
  background:repeating-linear-gradient(to bottom, var(--connector) 0 8px, transparent 8px 16px);
  opacity:.55;
}

/* track title node — sits on the spine */
.track-node{
  position:relative;z-index:2;width:min(360px,86%);margin:56px auto 30px;
  background:var(--node);border:2.5px solid var(--node-border);border-radius:12px;
  padding:16px 20px 14px;text-align:center;
  box-shadow:4px 4px 0 rgba(19,26,22,.85);
}
.track-node h2{font-family:"Archivo",sans-serif;font-weight:800;font-size:1.35rem;letter-spacing:-.01em}
.track-node .meta{font-family:"IBM Plex Mono",monospace;font-size:.72rem;color:#4a4a33;margin-top:4px}
.track-node .tbar{height:6px;background:rgba(19,26,22,.15);border-radius:99px;overflow:hidden;margin-top:10px}
.track-node .tbar>div{height:100%;width:0%;background:var(--done);border-radius:99px;transition:width .3s}

/* one group = a row: [left branch] [center node] [right branch] */
.grow{
  display:grid;grid-template-columns:1fr 230px 1fr;
  align-items:center;margin:0 0 46px;position:relative;
}
.gnode{
  grid-column:2;position:relative;z-index:2;
  background:var(--node);border:2px solid var(--node-border);border-radius:10px;
  padding:12px 14px;text-align:center;
  font-family:"Archivo",sans-serif;font-weight:750;font-size:.98rem;line-height:1.25;
  box-shadow:3px 3px 0 rgba(19,26,22,.8);
}
.gnode small{display:block;font-family:"IBM Plex Mono",monospace;font-weight:400;font-size:.68rem;color:#4a4a33;margin-top:4px}

.branch{display:flex;flex-direction:column;gap:9px;position:relative;z-index:1}
.branch.right{grid-column:3;align-items:flex-start;padding-left:56px}
.branch.left{grid-column:1;grid-row:1;align-items:flex-end;padding-right:56px}

/* checkable child nodes */
.node{
  position:relative;display:flex;align-items:center;gap:9px;
  background:var(--child);border:1.8px solid var(--node-border);border-radius:8px;
  padding:8px 13px;cursor:pointer;user-select:none;text-align:left;
  font:inherit;font-size:.87rem;font-weight:500;color:var(--ink);
  max-width:380px;
  transition:transform .12s, background .2s, border-color .2s;
  box-shadow:2px 2px 0 rgba(19,26,22,.55);
}
.node:hover{transform:translateY(-2px)}
/* dotted connector from child back to the spine */
.branch.right .node::before{
  content:"";position:absolute;right:100%;top:50%;height:2px;width:calc(56px + 115px);
  background:repeating-linear-gradient(to right, var(--connector) 0 6px, transparent 6px 12px);
  opacity:.5;z-index:-1;
}
.branch.left .node::before{
  content:"";position:absolute;left:100%;top:50%;height:2px;width:calc(56px + 115px);
  background:repeating-linear-gradient(to right, var(--connector) 0 6px, transparent 6px 12px);
  opacity:.5;z-index:-1;
}
.node .box{
  width:16px;height:16px;flex:none;border:2px solid var(--ink);border-radius:4px;background:#fff;
  display:grid;place-items:center;font-size:10px;line-height:1;color:#fff;
}
.node.checked{background:var(--done-bg);border-color:var(--done);box-shadow:2px 2px 0 rgba(27,110,83,.45)}
.node.checked .box{background:var(--done);border-color:var(--done)}
.node.checked .box::after{content:"✓"}
.node.checked .lbl{text-decoration:line-through;text-decoration-thickness:1.5px;opacity:.6}
.node:focus-visible{outline:2px solid var(--connector);outline-offset:3px}

footer{padding:60px 0 40px;text-align:center}
.fineprint{font-family:"IBM Plex Mono",monospace;font-size:.72rem;color:var(--muted)}

/* ---------- mobile: collapse to single column ---------- */
@media(max-width:800px){
  .map::before{left:18px;transform:none}
  .track-node{margin-left:38px;margin-right:0;width:auto;text-align:left}
  .grow{display:block;margin-left:38px;margin-bottom:38px}
  .gnode{margin-bottom:12px}
  .branch, .branch.left, .branch.right{padding:0;align-items:stretch}
  .branch .node{max-width:none;width:100%}
  .branch.right .node::before,.branch.left .node::before{
    right:100%;left:auto;width:38px;
  }
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <p class="eyebrow">Interview Prep Tracker</p>
    <h1>Ace-the-Interview Roadmap</h1>
    <p class="sub">roadmap.sh style — but every node is a checkbox. Click to mark done; progress saves automatically.</p>
  </div>
</header>

<div class="progress-card">
  <div class="wrap progress-inner">
    <span class="pct" id="overallPct">0 / 0 (0%)</span>
    <div class="bar"><div id="overallBar"></div></div>
    <button class="reset-btn" id="resetBtn" type="button">reset all</button>
  </div>
</div>

<main class="wrap">
  <div class="map" id="app"></div>
</main>

<footer>
  <p class="fineprint">check it → say it out loud → move on</p>
</footer>

<script>
/* ================= DATA ================= */
const TRACKS = [
{
  id:"py", name:"Python Core",
  groups:[
    {title:"Language internals", items:[
      "Mutable default arguments gotcha",
      "Mutability & identity (is vs ==)",
      "Shallow vs deep copy",
      "Pass-by-object-reference semantics",
      "Scoping: LEGB, global/nonlocal",
      "String interning & small-int caching"
    ]},
    {title:"Functions & decorators", items:[
      "*args / **kwargs & unpacking",
      "Closures & late binding in loops",
      "Decorators (write one from scratch)",
      "functools: wraps, lru_cache, partial",
      "Lambda limits"
    ]},
    {title:"Iterators & generators", items:[
      "Iterator protocol (__iter__/__next__)",
      "Generators & yield (write one live)",
      "Generator exprs vs list comps",
      "itertools: chain, groupby, islice"
    ]},
    {title:"OOP & dunder methods", items:[
      "__init__ vs __new__",
      "classmethod vs staticmethod",
      "__repr__ vs __str__, __eq__ & __hash__",
      "Inheritance, MRO & super()",
      "Properties & descriptors (high level)",
      "Dataclasses & when to use them",
      "ABCs / duck typing"
    ]},
    {title:"Memory & performance", items:[
      "How dicts work (hashing, collisions)",
      "list vs tuple vs set vs dict costs",
      "Refcounting & garbage collection",
      "__slots__ and why they save memory",
      "Complexity of builtin operations"
    ]},
    {title:"Concurrency", items:[
      "The GIL — what it does & doesn't block",
      "threading vs multiprocessing vs asyncio",
      "When threads help (I/O-bound)",
      "Race conditions & locks (basic)",
      "concurrent.futures basics"
    ]},
    {title:"Errors & context managers", items:[
      "try/except/else/finally semantics",
      "Custom exceptions & chaining",
      "__enter__ / __exit__",
      "Context manager via contextlib"
    ]}
  ]
},
{
  id:"dsa", name:"DSA / LeetCode Patterns",
  groups:[
    {title:"Foundations", items:[
      "Big-O (time, space, amortized)",
      "Arrays & hashing (two sum, anagrams)",
      "Two pointers (3sum, palindrome)",
      "Sliding window (min window substring)",
      "Prefix sums"
    ]},
    {title:"Core structures", items:[
      "Stack (parens, monotonic, min stack)",
      "Queue & deque patterns",
      "Linked list (reverse, cycle, LRU cache)",
      "Binary search (rotated, boundaries)",
      "Heap (top-k, k-way merge)",
      "Intervals (merge, meeting rooms)"
    ]},
    {title:"Trees & graphs", items:[
      "Traversals (DFS ×3, BFS levels)",
      "BST validation",
      "Lowest common ancestor",
      "Graph BFS/DFS (islands, clone)",
      "Topological sort (course schedule)",
      "Union-Find basics",
      "Tries (implement, word search)"
    ]},
    {title:"Advanced patterns", items:[
      "Backtracking (subsets, permutations)",
      "1-D DP (house robber, LIS)",
      "2-D DP (unique paths, edit distance)",
      "Greedy (jump game, gas station)",
      "Bit manipulation basics",
      "Kadane's algorithm"
    ]},
    {title:"Interview mechanics", items:[
      "Narrate approach before coding",
      "Dry-run an example before done",
      "State complexity unprompted",
      "Edge cases aloud (empty, dup, one)"
    ]}
  ]
},
{
  id:"sql", name:"SQL & PostgreSQL",
  groups:[
    {title:"Query fluency", items:[
      "JOINs & when rows multiply",
      "GROUP BY + HAVING vs WHERE",
      "Aggregates & NULL behavior",
      "Correlated vs uncorrelated subqueries",
      "CTEs & recursive CTEs",
      "CASE & conditional aggregation",
      "DISTINCT ON / dedup patterns"
    ]},
    {title:"Window functions", items:[
      "ROW_NUMBER vs RANK vs DENSE_RANK",
      "LAG / LEAD (MoM change)",
      "Running totals & moving averages",
      "PARTITION BY vs GROUP BY",
      "Top-N per group (the classic)"
    ]},
    {title:"PostgreSQL internals", items:[
      "B-tree vs GIN vs hash — when each",
      "Composite & partial indexes",
      "EXPLAIN ANALYZE — read a plan",
      "Why an index gets ignored",
      "VACUUM & MVCC (high level)"
    ]},
    {title:"Design & transactions", items:[
      "Normalization 1NF→3NF, denormalizing",
      "Keys & constraints",
      "ACID with examples",
      "Isolation levels & anomalies",
      "BEGIN/COMMIT/ROLLBACK, locking",
      "N+1 query problem & fixes"
    ]}
  ]
},
{
  id:"sys", name:"System Design",
  groups:[
    {title:"Building blocks", items:[
      "Vertical vs horizontal scaling",
      "Load balancers (L4 vs L7)",
      "Caching layers & LRU eviction",
      "Cache invalidation / cache-aside",
      "Replication (leader-follower)",
      "Sharding & partition keys",
      "Message queues (Kafka basics)",
      "CDNs & static content"
    ]},
    {title:"Concepts & trade-offs", items:[
      "CAP theorem with a real example",
      "SQL vs NoSQL — when & why",
      "Strong vs eventual consistency",
      "Latency vs throughput",
      "Idempotency & retries",
      "Rate limiting strategies",
      "Back-of-envelope estimation"
    ]},
    {title:"API & communication", items:[
      "REST design (verbs, codes, pagination)",
      "REST vs gRPC vs WebSockets",
      "Sessions vs JWT vs OAuth (high level)"
    ]},
    {title:"Classic designs (aloud)", items:[
      "URL shortener",
      "Rate limiter",
      "Twitter / news feed",
      "Chat system",
      "Framework: reqs → estimate → API → data → scale"
    ]}
  ]
},
{
  id:"ml", name:"ML / AI Engineer",
  groups:[
    {title:"ML fundamentals", items:[
      "Bias-variance trade-off",
      "Overfitting: detect & fix",
      "L1 vs L2 regularization",
      "Cross-validation & data leakage",
      "Class imbalance strategies",
      "Feature engineering & scaling",
      "SGD / Adam — intuition"
    ]},
    {title:"Evaluation", items:[
      "Precision/recall/F1 — when accuracy lies",
      "ROC-AUC vs PR-AUC",
      "RMSE vs MAE vs R²",
      "Confusion matrix walkthrough",
      "Splits & why test stays untouched"
    ]},
    {title:"Whiteboard models", items:[
      "Linear & logistic regression",
      "Trees, random forest, XGBoost",
      "Neural nets: backprop intuition",
      "Transformers & attention (high level)",
      "Fine-tuning vs prompting vs RAG",
      "Embeddings & similarity search",
      "GNNs / message passing (Chemprop)"
    ]},
    {title:"ML systems & MLOps", items:[
      "Training vs serving skew",
      "Batch vs real-time inference",
      "Versioning & tracking (MLflow)",
      "Monitoring & data drift",
      "End-to-end pipeline design",
      "A/B testing a model change"
    ]},
    {title:"Project deep-dives (aloud)", items:[
      "Chemprop: why FP+MPNN, results, next steps",
      "SentimentLense: why BERT won, error analysis",
      "Finance Bot: LangGraph agent design",
      "One failure/debug story per project"
    ]}
  ]
}
];

/* ================= STORAGE ================= */
const KEY = "interview_roadmap_v1";
let mem = {};
async function loadState(){
  try{ if(window.storage){ const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : {}; } }catch(e){}
  try{ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : {}; }catch(e){}
  return mem;
}
async function saveState(state){
  mem = state;
  try{ if(window.storage){ await window.storage.set(KEY, JSON.stringify(state)); return; } }catch(e){}
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}

/* ================= RENDER ================= */
const app = document.getElementById("app");
let state = {};
const idFor = (t,g,i)=>`${t}:${g}:${i}`;

function render(){
  app.innerHTML = "";
  TRACKS.forEach((track,ti)=>{
    const tn = document.createElement("div");
    tn.className = "track-node";
    tn.innerHTML = `<h2>${track.name}</h2>
      <div class="meta" id="count-${track.id}"></div>
      <div class="tbar"><div id="bar-${track.id}"></div></div>`;
    app.appendChild(tn);

    track.groups.forEach((group,gi)=>{
      const side = gi % 2 === 0 ? "right" : "left";
      const row = document.createElement("div");
      row.className = "grow";
      const done = group.items.filter((_,ii)=>state[idFor(ti,gi,ii)]).length;
      row.innerHTML = `
        <div class="gnode">${group.title}<small id="gc-${ti}-${gi}">${done}/${group.items.length}</small></div>
        <div class="branch ${side}"></div>`;
      const branch = row.querySelector(".branch");
      group.items.forEach((label,ii)=>{
        const id = idFor(ti,gi,ii);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "node" + (state[id] ? " checked" : "");
        btn.setAttribute("aria-pressed", !!state[id]);
        btn.innerHTML = `<span class="box" aria-hidden="true"></span><span class="lbl">${label}</span>`;
        btn.addEventListener("click", ()=>toggle(id, btn, ti, gi));
        branch.appendChild(btn);
      });
      app.appendChild(row);
    });
  });
  updateProgress();
}

async function toggle(id, btn, ti, gi){
  state[id] = !state[id];
  if(!state[id]) delete state[id];
  btn.classList.toggle("checked", !!state[id]);
  btn.setAttribute("aria-pressed", !!state[id]);
  const g = TRACKS[ti].groups[gi];
  const done = g.items.filter((_,ii)=>state[idFor(ti,gi,ii)]).length;
  document.getElementById(`gc-${ti}-${gi}`).textContent = `${done}/${g.items.length}`;
  updateProgress();
  await saveState(state);
}

function updateProgress(){
  let total=0, doneAll=0;
  TRACKS.forEach((track,ti)=>{
    let t=0,d=0;
    track.groups.forEach((g,gi)=>g.items.forEach((_,ii)=>{ t++; if(state[idFor(ti,gi,ii)]) d++; }));
    total+=t; doneAll+=d;
    const pct = t? Math.round(d/t*100):0;
    document.getElementById(`bar-${track.id}`).style.width = pct+"%";
    document.getElementById(`count-${track.id}`).textContent = `${d}/${t} complete · ${pct}%`;
  });
  const pct = total? Math.round(doneAll/total*100):0;
  document.getElementById("overallBar").style.width = pct+"%";
  document.getElementById("overallPct").textContent = `${doneAll} / ${total} (${pct}%)`;
}

document.getElementById("resetBtn").addEventListener("click", async ()=>{
  if(!confirm("Clear all progress?")) return;
  state = {};
  await saveState(state);
  render();
});

(async ()=>{ state = await loadState() || {}; render(); })();
</script>
</body>
</html>
